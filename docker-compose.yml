version: '3.8'

services:
  userbot:
    build: .
    container_name: telegram_userbot
    restart: always
    stdin_open: true # Keep stdin open for interaction (like QR code)
    tty: true        # Allocate a pseudo-TTY
    volumes:
      - ./app/data:/app/app/data
      - ./app/user_session.session:/app/app/user_session.session
    env_file:
      - .env
